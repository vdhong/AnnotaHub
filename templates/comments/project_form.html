{% extends "comments/base.html" %}
{% load i18n %}
{% block title %}{{ action }} {% trans "Project" %} - AnnotaHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-folder{% if action == 'Create' %}-plus{% endif %}"></i> {{ action }} {% trans "Project" %}</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">{% trans "Project Name" %} *</label>
                        <input type="text" name="name" class="form-control" value="{{ project.name|default:'' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{% trans "Description" %}</label>
                        <textarea name="description" class="form-control" rows="3">{{ project.description|default:'' }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">{{ action }}</button>
                        <a href="{% url 'comments:project_list' %}" class="btn btn-secondary">{% trans "Cancel" %}</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
